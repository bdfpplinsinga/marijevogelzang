<!doctype html>
<html lang="{{ site:short_locale }}">

<head>
    {{ partial:snippets/google_scripts }}
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title ?? site:name }}</title>
    {{ partial:snippets/google_fonts }}
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11.2.6/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11.2.6/swiper-bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://www.eventbrite.com/static/widgets/eb_widgets.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@barba/core"></script>
    {{ vite src="resources/js/site.js|resources/css/site.css" }}
</head>

<body data-barba="wrapper" class="flex flex-col min-h-screen bg-white text-black antialiased p-6 md:p-14">
    <div data-barba="container" class="max-w-screen-2xl w-full mx-auto">
        {{ partial:layout/header }}
        {{ template_content }}
        {{ partial:layout/footer }}
    </div>
    {{ recaptcha }}
</body>

</html>
